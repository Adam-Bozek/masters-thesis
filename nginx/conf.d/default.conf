server {
    listen 80;
    listen [::]:80;
    server_name tekos.3pocube.fei.tuke.sk;

    include nginxconfig.io/letsencrypt.conf;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://tekos.3pocube.fei.tuke.sk$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    
    server_name tekos.3pocube.fei.tuke.sk;

    ssl_certificate         /etc/letsencrypt/live/tekos.3pocube.fei.tuke.sk/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/tekos.3pocube.fei.tuke.sk/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/tekos.3pocube.fei.tuke.sk/chain.pem;

    include nginxconfig.io/security.conf;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        include nginxconfig.io/proxy.conf;
    }

    include nginxconfig.io/general.conf;
}