services:
  database:
    image: postgres:18.1-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_INITDB_ARGS: "--auth-local=scram-sha-256 --auth-host=scram-sha-256"
    command: ["postgres", "-c", "password_encryption=scram-sha-256"]
    env_file:
      - ./database/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    shm_size: "1gb"
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -h 127.0.0.1']
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 15s
    networks: [app]

  cache:
    image: redis:8.6.1-alpine
    container_name: redis
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: >
      sh -c 'exec redis-server
      --protected-mode yes
      --maxmemory 256mb
      --maxmemory-policy volatile-ttl
      --appendonly no
      --save ""
      --requirepass "$REDIS_PASSWORD"'
    stop_grace_period: 30s
    ulimits:
      nofile: 65536
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$REDIS_PASSWORD" PING']
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 15s
    networks: [app]

  backend:
    container_name: backend
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/backend.dockerfile
    env_file:
      - ./backend/.env
    environment:
      REDIS_HOST: cache
      REDIS_PORT: 6379
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    networks: [app]

  frontend:
    container_name: frontend
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: frontend.dockerfile
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    networks: [app]

  nginx:
    image: nginx:1.29.6-alpine-slim
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/nginxconfig.io:/etc/nginx/nginxconfig.io:ro
      - ./nginx/dhparam.pem:/etc/nginx/dhparam.pem:ro
      - certs:/etc/letsencrypt:ro
      - letsencrypt_webroot:/var/www/_letsencrypt
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    networks:
      - app

  certbot:
    profiles: ["manual"]
    container_name: certbot
    image: certbot/certbot
    restart: "no"
    volumes:
      - certs:/etc/letsencrypt
      - letsencrypt_webroot:/var/www/_letsencrypt
    networks:
      - app

volumes:
  postgres_data:
  redis_data:
  certs:
  letsencrypt_webroot:

networks:
  app:
    driver: bridge
